# =============================================================
#  TaskOrbit VirtualHost — modo subdirectorio (estilo Laragon)
#  La app se sirve en:  http://localhost:${HOST_HTTP_PORT}${APP_BASE_PATH}
#  ej: http://localhost:8080/taskorbit
#
#  Los placeholders __APP_BASE_PATH__ son substituidos al arrancar
#  el contenedor por docker/entrypoint.sh con la variable APP_BASE_PATH.
# =============================================================
<VirtualHost *:80>
    ServerAdmin admin@taskorbit.local
    ServerName  localhost
    DocumentRoot /var/www/html/public

    # Logs a stderr para que aparezcan en `docker logs`
    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined

    # ---- Landing en la raiz: redirige a la app ----
    RedirectMatch 302 ^/$ __APP_BASE_PATH__/

    # ---- Alias del subpath -> public/ del proyecto ----
    Alias __APP_BASE_PATH__ /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        # IMPORTANTE: AllowOverride None para IGNORAR public/.htaccess
        # (que esta hard-coded para Laragon con RewriteBase /tareas/public/
        # y causa loop infinito si se mezcla con el Alias del vhost).
        # Las reglas viven aqui, y .htaccess sigue funcionando para Laragon.
        AllowOverride None
        Require all granted

        DirectoryIndex index.php

        # Front controller pattern: cualquier cosa que no exista -> index.php
        # Con Alias, el rewrite trabaja sobre paths fisicos del <Directory>;
        # NO usar RewriteBase porque produce loops via Alias.
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Bloquear acceso directo a directorios sensibles
    <DirectoryMatch "^/var/www/html/(app|config|database|routes|storage|sql|bin|docker)">
        Require all denied
    </DirectoryMatch>
</VirtualHost>
